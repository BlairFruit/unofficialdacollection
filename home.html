<!DOCTYPE html>
<html>
<head>
    <title>The Unofficial DEAXS ADVENTURE Collection</title>
    
    <link rel="stylesheet" href="assets/css/shared.css">
    
    <style>
        body { padding-top: 110px; }
        
        .menu-btn { display: block; width: 200px; margin: 20px auto; padding: 15px; background: #222; color: white; text-decoration: none; border: 2px solid white; font-size: 1.2rem; font-family: inherit; box-sizing: border-box; transition: 0.3s; cursor: pointer; }
        .menu-btn:hover { background: white; color: black; }
        
        .update-btn { display: block; width: 200px; margin: 20px auto; padding: 15px; background: #1a1a1a; color: #ffd700; font-family: "Courier New", monospace; font-size: 1.2rem; text-decoration: none; border: 2px solid #ffd700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 8px rgba(255, 215, 0, 0.2); text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); animation: pulse-gold 2s infinite; }
        .update-btn:hover { background: #ffd700; color: #121212; text-shadow: none; box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); animation: none; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); } 70% { box-shadow: 0 0 15px 10px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: #111; border: 2px solid gold; padding: 30px; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.9); }
        .modal-btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .modal-btn { background: #222; color: white; border: 1px solid white; padding: 10px 20px; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: bold; }
        .modal-btn:hover { background: white; color: black; }
        .modal-btn.danger:hover { background: #ff3333; color: white; border-color: #ff3333; }
        
        #main-logo { opacity: 0; transform: translateY(30px); }
        #menu-container { opacity: 0; }
        
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInMenu { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* --- VERSION DISPLAY STYLE --- */
        .version-display {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: #666;
            font-family: "Courier New", monospace;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>
    <div class="retro-title-bar">
        <div style="display: flex; align-items: center;">
            <img src="assets/media/icon.png" class="title-bar-icon" alt="icon">
            <div class="retro-title-text">The Unofficial DEAXS ADVENTURE Collection</div>
        </div>
        <div class="retro-window-controls">
            <button class="retro-btn" onclick="minimizeApp()">_</button>
            <button class="retro-btn" onclick="maximizeApp()">□</button>
            <button class="retro-btn" onclick="closeApp()">X</button>
        </div>
    </div>

    <div class="browser-ui-container">
        <div class="retro-tabs" id="tab-container"></div>
        <div class="retro-address-bar">
            <span class="retro-address-label">Address</span>
            <div class="retro-address-input-wrapper">
                <img src="assets/media/icon.png" class="fake-favicon" alt="icon">
                <input type="text" id="address-input" value="deaxs://home/menu.html" readonly spellcheck="false">
            </div>
        </div>
    </div>

    <div id="new-game-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: gold; margin-top: 0;">WARNING</h2>
            <p>Starting a New Game will reset all your progress, achievements, and gallery unlocks.<br><br>Are you sure?</p>
            <div class="modal-btn-container">
                <button class="modal-btn" onclick="cancelNewGame()">CANCEL</button>
                <button class="modal-btn danger" onclick="confirmNewGame()">YES, RESET</button>
            </div>
        </div>
    </div>

    <img id="main-logo" src="assets/media/logo-menu.png" alt="Logo" style="max-width: 400px;">
    
    <div id="menu-container" style="margin-top: 50px;">
        <button onclick="startNewGame()" class="menu-btn">NEW GAME</button>
        <a href="#" id="continue-btn" class="menu-btn">CONTINUE</a>
        <a href="extras.html" class="menu-btn">EXTRAS</a>
        <a href="achievements.html" class="menu-btn">ACHIEVEMENTS</a>
        <button onclick="checkForUpdates()" class="update-btn">CHECK FOR UPDATES</button>
        <p id="update-status" style="margin-top: 15px; font-weight: bold; color: #aaa;"></p>
    </div>

    <div id="version-display" class="version-display">App Version: Loading...</div>

    <script src="assets/js/shared.js"></script>

    <script>
        const fs = require('fs');
        const path = require('path');

        const APP_VERSION = "1.0.0";

        document.addEventListener("DOMContentLoaded", () => {
            const logo = document.getElementById('main-logo');
            const menu = document.getElementById('menu-container');

            if (!sessionStorage.getItem('app-started')) {
                logo.style.animation = "fadeSlideUp 1.5s ease-out forwards";
                menu.style.animation = "fadeInMenu 1s ease-out 1.2s forwards"; 
                sessionStorage.setItem('app-started', 'true');
            } else {
                logo.style.opacity = "1";
                logo.style.transform = "translateY(0)";
                menu.style.opacity = "1";
            }

            document.getElementById('version-display').innerText = `Collection Version: v${APP_VERSION}`;
        });

        function startNewGame() {
            if (localStorage.getItem('saved-page')) {
                document.getElementById('new-game-modal').style.display = 'flex';
            } else { confirmNewGame(); }
        }

        function confirmNewGame() {
            localStorage.clear(); 
            window.location.href = "index.html?p=1";
        }

        function cancelNewGame() { document.getElementById('new-game-modal').style.display = 'none'; }

        const savedPage = localStorage.getItem('saved-page');
        const continueBtn = document.getElementById('continue-btn');
        if (savedPage) {
            continueBtn.href = `index.html?p=${savedPage}`;
            continueBtn.innerText = `CONTINUE (PG. ${savedPage})`;
        } else {
            continueBtn.style.opacity = "0.3";
            continueBtn.style.pointerEvents = "none";
        }

        const REPO_BASE_URL = 'https://raw.githubusercontent.com/BlairFruit/unofficialdacollection/refs/heads/main/';
        const LOCAL_DATA_PATH = path.join(__dirname, 'assets', 'data.json');
        const statusText = document.getElementById('update-status');

        async function checkForUpdates() {
            statusText.innerText = "Checking for Software Updates...";
            statusText.style.color = "#aaa";

            try {
                const versionRes = await fetch(REPO_BASE_URL + 'version.json');
                if (versionRes.ok) {
                    const remoteVersionData = await versionRes.json();
                    
                    if (remoteVersionData.version !== APP_VERSION) {
                        statusText.innerText = `Downloading App Update v${remoteVersionData.version}... Please wait.`;
                        statusText.style.color = "gold";
                        
                        const coreFiles = [
                            'home.html',
                            'index.html',
                            'extras.html',
                            'achievements.html',
                            'assets/css/shared.css',
                            'assets/js/shared.js',
                            'main.js'
                        ];

                        for (let file of coreFiles) {
                            const fileRes = await fetch(REPO_BASE_URL + file);
                            const fileContent = await fileRes.text();
                            const savePath = path.join(__dirname, file);
                            fs.writeFileSync(savePath, fileContent);
                        }

                        statusText.innerText = "Update Complete! Restarting App...";
                        statusText.style.color = "#00ff00";
                        
                        setTimeout(() => {
                            ipcRenderer.send('close-app'); 
                        }, 2000);
                        
                        return; 
                    }
                }

                statusText.innerText = "App is up to date. Checking for new comic pages...";
                
                const response = await fetch(REPO_BASE_URL + 'assets/data.json');
                if (!response.ok) throw new Error("Could not connect to GitHub.");
                const remoteData = await response.json();

                const localData = JSON.parse(fs.readFileSync(LOCAL_DATA_PATH, 'utf8'));
                const localPageCount = Object.keys(localData.pages).length;
                const remotePageCount = Object.keys(remoteData.pages).length;

                if (remotePageCount <= localPageCount) {
                    statusText.innerText = "You are completely up to date!";
                    statusText.style.color = "#00ff00";
                    return;
                }

                statusText.innerText = `Downloading pages ${localPageCount + 1} to ${remotePageCount}...`;
                statusText.style.color = "gold";

                let downloadQueue = [];
                for (let p = localPageCount + 1; p <= remotePageCount; p++) {
                    let pageStr = p.toString();
                    let pageBlocks = remoteData.pages[pageStr];
                    if (pageBlocks) {
                        let assetCounter = 1; 
                        pageBlocks.forEach(block => {
                            if (block.type === 'image' || block.type === 'video') {
                                let remotePath = block.value; 
                                let ext = path.extname(remotePath);
                                let newFileName = `p${p}-${assetCounter}${ext}`;
                                let newRelPath = `assets/media/${newFileName}`;
                                let localSavePath = path.join(__dirname, 'assets', 'media', newFileName);
                                downloadQueue.push({ url: REPO_BASE_URL + remotePath, savePath: localSavePath });
                                block.value = newRelPath;
                                assetCounter++;
                            }
                        });
                        localData.pages[pageStr] = pageBlocks;
                    }
                }

                for (let i = 0; i < downloadQueue.length; i++) {
                    let item = downloadQueue[i];
                    statusText.innerText = `Downloading asset ${i + 1} of ${downloadQueue.length}...`;
                    fs.mkdirSync(path.dirname(item.savePath), { recursive: true });
                    let fileRes = await fetch(item.url);
                    let arrayBuffer = await fileRes.arrayBuffer();
                    let buffer = Buffer.from(arrayBuffer);
                    fs.writeFileSync(item.savePath, buffer);
                }

                statusText.innerText = "Finalizing update...";
                fs.writeFileSync(LOCAL_DATA_PATH, JSON.stringify(localData, null, 2));
                
                statusText.innerText = "New pages installed successfully!";
                statusText.style.color = "#00ff00";

            } catch (err) {
                console.error(err);
                statusText.innerText = "Error updating. Check your connection.";
                statusText.style.color = "red";
            }
        }
    </script>
</body>
</html>
