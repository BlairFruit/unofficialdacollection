<!DOCTYPE html>
<html>
<head>
    <title>The Unofficial DEAXS ADVENTURE Collection - Settings</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: comic: https://raw.githubusercontent.com; media-src 'self' comic: https://raw.githubusercontent.com; connect-src 'self' https://raw.githubusercontent.com;">
    <link rel="stylesheet" href="assets/css/shared.css">
    
    <style>
        body { padding: 110px 20px 50px 20px; }
        
        .settings-container { max-width: 600px; margin: 0 auto; text-align: left; }
        
        .settings-box { 
            background: #c0c0c0; 
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #666;
            border-bottom: 2px solid #666;
            padding: 20px; 
            margin-bottom: 20px; 
            color: black;
        }

        .settings-header {
            background-color: #000080;
            color: white;
            padding: 5px 10px;
            font-family: "Courier New", monospace;
            font-weight: bold;
            margin: -20px -20px 20px -20px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        select.retro-select {
            background: #fff;
            border: 2px inset #ccc;
            padding: 5px;
            font-family: inherit;
            width: 200px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 195px;
            cursor: pointer;
        }
        
        .setting-desc { font-size: 11px; color: #444; display: block; margin-top: 3px; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease-in; }
        .tab-btn { background: #1e1e1e; color: #888; border: 2px solid #444; font-family: "Courier New", monospace; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #000080; color: white; border-color: white; box-shadow: 2px 2px 0 #fff inset; }
        body:not(.theme-satrn) .split-sidebar { display: none !important; }
        body:not(.theme-satrn) .section { display: block !important; animation: none; }
    </style>
</head>
<body>
    <div class="retro-title-bar">
        <div style="display: flex; align-items: center;">
            <img src="assets/media/icon.png" class="title-bar-icon" alt="icon">
            <div class="retro-title-text">The Unofficial DEAXS ADVENTURE Collection - Settings</div>
        </div>
        <div class="retro-window-controls">
            <button class="retro-btn" onclick="minimizeApp()">_</button>
            <button class="retro-btn" onclick="maximizeApp()">□</button>
            <button class="retro-btn" onclick="closeApp()">X</button>
        </div>
    </div>

    <div class="browser-ui-container">
        <div class="retro-tabs" id="tab-container"></div>
        
        <div class="retro-address-bar" style="position: relative;">
            <span class="retro-address-label">Address</span>
            <div class="retro-address-input-wrapper">
                <img src="assets/media/icon.png" class="fake-favicon" alt="icon">
                <input type="text" id="address-input" onkeypress="if(typeof handleAddressBar === 'function') handleAddressBar(event)" spellcheck="false">
            </div>
            <button id="bookmark-icon-btn" class="retro-btn" style="width: 24px; height: 24px; font-size: 16px; margin-left: 5px; display: flex; align-items: center; justify-content: center; padding-bottom: 2px;" onclick="toggleBookmarkMenu(event)">☆</button>
            
            <div id="bookmark-context-menu" class="bookmark-dropdown" style="display: none;">
                <div id="bookmark-save-action" class="bookmark-dropdown-action" onclick="saveCurrentPage()">+ Save this page</div>
                <div id="bookmark-save-divider" class="bookmark-dropdown-divider"></div>
                <div id="bookmark-dropdown-list" class="bookmark-dropdown-list"></div>
            </div>
        </div>
    </div>

    </div> <a href="home.html" class="nav-btn floating-menu-btn">← BACK TO MENU</a>
        <div class="split-layout">
            
            <div class="split-sidebar tab-container">
                <button class="tab-btn active" onclick="switchSettingsTab(this, 'set-display')">APP DISPLAY</button>
                <button class="tab-btn" onclick="switchSettingsTab(this, 'set-reader')">COMIC READER</button>
                <button class="tab-btn" onclick="switchSettingsTab(this, 'set-system')">SYSTEM & NAV</button>
                <button class="tab-btn" onclick="switchSettingsTab(this, 'set-media')">MEDIA & AUDIO</button>
                <button class="tab-btn" onclick="switchSettingsTab(this, 'set-features')">FEATURES</button>
            </div>

            <div class="split-content settings-container" style="margin: 0; max-width: none;">
                
                <div id="set-display" class="settings-section section active">
                    <div class="settings-box">
                        <div class="settings-header">APP DISPLAY</div>
                        <div class="setting-row">
                            <label for="theme-select"><strong>Global App Theme:</strong></label>
                            <select id="theme-select" class="retro-select" onchange="saveSettings()">
                                <option value="default">Default</option>
                                <option value="theme-satrn">SAT-RN OS</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="set-reader" class="settings-section section">
                    <div class="settings-box">
                        <div class="settings-header">COMIC READER</div>
                        <div class="setting-row">
                            <label for="reader-mode"><strong>Background Theme:</strong></label>
                            <select id="reader-mode" class="retro-select" onchange="saveSettings()">
                                <option value="dark">Dark Mode (Default)</option>
                                <option value="light">Light Mode</option>
                                <option value="metal">Metal Mode</option>
                                <option value="rsidnt">RSIDNT Mode</option>
                                <option value="threshold">Threshold Mode</option>
                                <option value="thresholdred">Red RSIDNT Mode</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <label for="reader-font-main"><strong>Main Font:</strong></label>
                            <select id="reader-font-main" class="retro-select" onchange="saveSettings()">
                                <option value="default">Default</option>
                                <option value="serif">Serif</option>
                                <option value="sans">Sans-Serif</option>
                                <option value="comic">Comic Sans</option>
                                <option value="dyslexic">OpenDyslexic</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <label for="reader-font-dialogue"><strong>Dialogue Font:</strong></label>
                            <select id="reader-font-dialogue" class="retro-select" onchange="saveSettings()">
                                <option value="default">Default</option>
                                <option value="serif">Serif</option>
                                <option value="sans">Sans</option>
                                <option value="comic">Comic Sans</option>
                                <option value="dyslexic">OpenDyslexic</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <label for="reader-size"><strong>Text Size:</strong></label>
                            <select id="reader-size" class="retro-select" onchange="saveSettings()">
                                <option value="small">Small</option>
                                <option value="medium">Medium</option>
                                <option value="large">Large</option>
                                <option value="xlarge">Extra Large</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="set-system" class="settings-section section">
                    <div class="settings-box">
                        <div class="settings-header">SYSTEM & NAVIGATION</div>
                        <div class="setting-row">
                            <label>
                                <strong>Auto-Check for Updates</strong><br>
                                <span class="setting-desc">Automatically check for new app and comic updates on launch.</span>
                            </label>
                            <input type="checkbox" id="toggle-autoupdate" onchange="saveSettings()">
                        </div>
                        <div class="setting-row">
                            <label>
                                <strong>Click to Turn Pages</strong><br>
                                <span class="setting-desc">Click the left/right sides of the screen to change comic pages.</span>
                            </label>
                            <input type="checkbox" id="toggle-clickturn" onchange="saveSettings()">
                        </div>
                    </div>
                </div>

                <div id="set-media" class="settings-section section">
                    <div class="settings-box">
                        <div class="settings-header">MEDIA & AUDIO</div>
                        <div class="setting-row">
                            <label><strong>Mute All Audio</strong></label>
                            <input type="checkbox" id="toggle-mute" onchange="saveSettings()">
                        </div>
                        <div class="setting-row">
                            <label><strong>Global Volume</strong></label>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.05" onchange="saveSettings()">
                        </div>
                    </div>
                </div>

                <div id="set-features" class="settings-section section">
                    <div class="settings-box">
                        <div class="settings-header">APPLICATION FEATURES</div>
                        <div class="setting-row">
                            <label><strong>Enable Achievements</strong></label>
                            <input type="checkbox" id="toggle-achievements" onchange="saveSettings()">
                        </div>
                        <div class="setting-row">
                            <label><strong>Enable Easter Eggs</strong></label>
                            <input type="checkbox" id="toggle-eastereggs" onchange="saveSettings()">
                        </div>
                        <div class="setting-row">
                            <label><strong>Discord Rich Presence</strong></label>
                            <input type="checkbox" id="toggle-discord" onchange="saveSettings()">
                        </div>
                        <div class="setting-row">
                            <label>
                                <strong>Hide Spoilers in Discord RPC</strong><br>
                                <span class="setting-desc">Hides exact page numbers from your Discord status.</span>
                            </label>
                            <input type="checkbox" id="toggle-spoilers" onchange="saveSettings()">
                        </div>
                    </div>
                </div>

            </div> 
        </div>
    </div>

    <script src="assets/js/shared.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('theme-select').value = localStorage.getItem('app-theme') || 'default';
            document.getElementById('toggle-achievements').checked = localStorage.getItem('setting-achievements') !== 'false';
            document.getElementById('toggle-eastereggs').checked = localStorage.getItem('setting-eastereggs') !== 'false';
            document.getElementById('toggle-discord').checked = localStorage.getItem('setting-discord') !== 'false';
            document.getElementById('toggle-mute').checked = localStorage.getItem('global-muted') === 'true';
            document.getElementById('toggle-autoupdate').checked = localStorage.getItem('setting-autoupdate') !== 'false';
            document.getElementById('toggle-clickturn').checked = localStorage.getItem('setting-clickturn') !== 'false';
            document.getElementById('toggle-spoilers').checked = localStorage.getItem('setting-spoilers') === 'true';

            document.getElementById('reader-mode').value = localStorage.getItem('reader-mode') || 'dark';
            document.getElementById('reader-font-main').value = localStorage.getItem('reader-font-main') || 'default';
            document.getElementById('reader-font-dialogue').value = localStorage.getItem('reader-font-dialogue') || 'default';
            document.getElementById('reader-size').value = localStorage.getItem('reader-size') || 'medium';
            
            document.getElementById('volume-slider').value = localStorage.getItem('global-volume') || 1;
        });

        function saveSettings() {
            const newTheme = document.getElementById('theme-select').value;
            localStorage.setItem('app-theme', newTheme);
            
            document.body.classList.remove('theme-satrn');
            const iconPath = newTheme === 'theme-satrn' ? "assets/media/pixelated-icon.png" : "assets/media/icon.png";
            document.querySelectorAll('.title-bar-icon, .fake-favicon, .unused-title-bar img').forEach(img => {
                img.src = iconPath;
            });
            
            if (newTheme !== 'default') {
                document.body.classList.add(newTheme);
            }

            localStorage.setItem('app-theme', document.getElementById('theme-select').value);
            localStorage.setItem('setting-achievements', document.getElementById('toggle-achievements').checked);
            localStorage.setItem('setting-eastereggs', document.getElementById('toggle-eastereggs').checked);
            localStorage.setItem('setting-autoupdate', document.getElementById('toggle-autoupdate').checked);
            localStorage.setItem('setting-clickturn', document.getElementById('toggle-clickturn').checked);
            localStorage.setItem('setting-spoilers', document.getElementById('toggle-spoilers').checked);
            
            const rpcChecked = document.getElementById('toggle-discord').checked;
            localStorage.setItem('setting-discord', rpcChecked);
            if (!rpcChecked) {
                window.api.updateRpc({ details: '', state: '' });
            } else {
                if (typeof updateDiscordRPC === 'function') updateDiscordRPC();
            }

            localStorage.setItem('global-muted', document.getElementById('toggle-mute').checked);
            localStorage.setItem('global-volume', document.getElementById('volume-slider').value);

            localStorage.setItem('reader-mode', document.getElementById('reader-mode').value);
            localStorage.setItem('reader-font-main', document.getElementById('reader-font-main').value);
            localStorage.setItem('reader-font-dialogue', document.getElementById('reader-font-dialogue').value);
            localStorage.setItem('reader-size', document.getElementById('reader-size').value);
        }

        function switchSettingsTab(btn, tabId) {
            document.querySelectorAll('.settings-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.split-sidebar .tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
