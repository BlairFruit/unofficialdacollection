<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unofficial DEAXS ADVENTURE Collection - Comic</title>
    <link rel="icon" type="image/png" href="assets/media/icon.png">
    
    <link rel="stylesheet" href="assets/css/shared.css">
    
    <style>
        /* THEME VARIABLES */
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --block-bg: #0e0e1a;
            --block-border: #202225;
            --nav-btn-border: #fff;
            --nav-btn-text: #fff;
            --font-main: "Courier New", Courier, monospace;
            --font-dialogue: "Consolas", "Monaco", monospace;
            --base-font-size: 1.2rem;
            --dialogue-font-size: 1.1rem;
        }

        /* LIGHT MODE / COLOR OVERRIDES */
        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --block-bg: #f0f0f5;
            --block-border: #d1d1d1;
            --nav-btn-border: #1a1a1a;
            --nav-btn-text: #1a1a1a;
        }
        body.theme-metal { 
            background-color: #000;
            background-image: url('assets/media/metaltheme.png'); 
            background-position: center 85px;
            background-size: cover; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            
            --text-color: #e0e0e0;
            --block-bg: #0e0e1a;
            --block-border: #202225;
        }

        body.theme-rsidnt { 
            background-color: #0d001a; 
            background-image: url('assets/media/themersidnt.png'); 
            background-position: center 85px;
            background-size: cover; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            
            --text-color: #e0e0e0;
            --block-bg: #0e0e1a;
            --block-border: #202225;
        }

        /* NEW THEME 2: VINTAGE */
        body.theme-threshold { 
            background-color: #f4ecd8; 
            background-image: url('assets/media/themethreshold.png'); 
            background-position: center 110px;
            background-size: cover; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            
            --text-color: #e0e0e0;
            --block-bg: #0e0e1a;
            --block-border: #202225;
        }

        body.theme-thresholdred { 
            background-color: #f4ecd8; 
            background-image: url('assets/media/themethresholdred.png'); 
            background-position: center 110px;
            background-size: cover; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            
            --text-color: #e0e0e0;
            --block-bg: #0e0e1a;
            --block-border: #202225;
        }

        body.main-font-serif { --font-main: "Georgia", serif; }
        body.main-font-sans { --font-main: "Arial", Helvetica, sans-serif; }
        body.main-font-comic { --font-main: "Comic Sans MS", "Comic Sans", cursive; }
        body.main-font-dyslexic { --font-main: "OpenDyslexic", "Comic Sans MS", Arial, sans-serif; }
        body.main-font-dyslexic .text-block { letter-spacing: 0.1em; line-height: 2; word-spacing: 0.2em; }

        body.dialogue-font-serif { --font-dialogue: "Georgia", serif; }
        body.dialogue-font-sans { --font-dialogue: "Arial", Helvetica, sans-serif; }
        body.dialogue-font-comic { --font-dialogue: "Comic Sans MS", "Comic Sans", cursive; }
        body.dialogue-font-dyslexic { --font-dialogue: "OpenDyslexic", "Comic Sans MS", Arial, sans-serif; }
        body.dialogue-font-dyslexic .dialogue-box { letter-spacing: 0.1em; line-height: 2; word-spacing: 0.2em; }

        /* SIZE OVERRIDES */
        body.size-small { --base-font-size: 0.9rem; --dialogue-font-size: 0.85rem; }
        body.size-large { --base-font-size: 1.6rem; --dialogue-font-size: 1.4rem; }
        body.size-xlarge { --base-font-size: 2.0rem; --dialogue-font-size: 1.8rem; font-weight: bold; }

        /* --- THIS IS THE BLOCK THAT CENTERS EVERYTHING --- */
        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            line-height: 1.6;
        }

        /* --- LIGHTBOX STYLES --- */
        .lightbox { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(5px); }
        .lightbox.show { display: flex; animation: fadeIn 0.2s ease-out; }
        .lightbox-content { max-width: 90%; max-height: 80vh; border: 2px solid gold; box-shadow: 0 0 25px rgba(0,0,0,0.8); background: #000; }
        #lightbox-img.lightbox-content { width: auto !important; height: auto !important; object-fit: contain; }
        #lightbox-vid.lightbox-content { width: 100% !important; }
        .lightbox-close-btn { margin-top: 20px; background: transparent; color: white; border: 1px solid white; padding: 8px 20px; cursor: pointer; font-family: "Courier New", monospace; transition: 0.3s; }
        .lightbox-close-btn:hover { background: white; color: black; }
        body.no-scroll { overflow: hidden; } /* Stops the background comic from scrolling while zoomed in */

        header { width: 100%; max-width: 800px; padding: 40px 20px; text-align: center; box-sizing: border-box; }
        .logo { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }

        .comic-container { width: 100%; max-width: 800px; padding: 0 20px; box-sizing: border-box; min-height: 50vh; margin: 0 auto; }
        .content-block { width: 100%; margin-bottom: 50px; animation: fadeIn 0.8s ease-in; }
        img, video { width: 100%; height: auto; display: block; border-radius: 2px; }

        .text-block { 
            text-align: left;
            line-height: 1.8; 
            font-size: var(--base-font-size);
            margin: 30px 0;
            width: 100%; 
            word-wrap: break-word;
            white-space: pre-wrap; 
        }

        .dialogue-box {
            background: var(--block-bg); 
            border: 1px solid var(--block-border);
            border-radius: 4px;
            padding: 20px;
            margin: 25px 0;
            width: 100%;
            box-sizing: border-box;
            font-family: var(--font-dialogue); 
            color: var(--text-color);
            white-space: pre-wrap; 
            font-size: var(--dialogue-font-size);
            text-align: left;
        }

        footer {
            width: 100%;
            max-width: 800px;
            padding: 60px 0;
            text-align: center;
            border-top: 1px solid #222;
            margin-top: 40px;
            margin-left: auto;
            margin-right: auto;
        }

        .nav-btn {
            background: transparent;
            color: var(--nav-btn-text);
            padding: 10px 25px;
            text-decoration: none;
            border: 2px solid var(--nav-btn-border); 
            font-family: var(--font-main);
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            margin: 5px 10px;
        }

        /* --- CUSTOM VIDEO PLAYER STYLES --- */
        .custom-video-wrapper { position: relative; width: 100%; background: #000; overflow: hidden; display: flex; flex-direction: column; margin: 20px 0; }
        .video-controls { position: absolute; bottom: 0; left: 0; width: 100%; box-sizing: border-box; display: flex; align-items: center; background: rgba(192, 192, 192, 0.95); padding: 5px 10px; gap: 10px; border-top: 2px solid #fff; color: black; z-index: 10; opacity: 0; transform: translateY(100%); transition: opacity 0.2s ease, transform 0.2s ease; }
        .custom-video-wrapper:hover .video-controls { opacity: 1; transform: translateY(0); }
        .video-controls input[type=range] { -webkit-appearance: none; appearance: none; background: #808080; height: 4px; cursor: pointer; }
        .video-controls input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 16px; width: 8px; background: gold; border: 1px solid black; cursor: pointer; box-shadow: 1px 1px 0 #fff inset; }
        .video-time-display { font-size: 10px; font-family: Arial, sans-serif; min-width: 60px; text-align: center; }
        .progress-bar { flex-grow: 1; }
        /* ---------------------------------- */

        .nav-btn:hover { background: var(--nav-btn-text); color: var(--bg-color); }
        .page-indicator { font-size: 0.9rem; color: #555; margin: 0 20px; vertical-align: middle; }

        .jump-container { margin-top: 25px; color: #666; font-size: 0.8rem; }
        .jump-input {
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            padding: 5px;
            width: 60px;
            text-align: center;
            font-family: var(--font-main);
            outline: none;
            border-radius: 3px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* ------------------------------ */
    </style>
</head>
<body>
    <div class="retro-title-bar">
        <div style="display: flex; align-items: center;">
            <img src="assets/media/icon.png" class="title-bar-icon" alt="icon">
            <div class="retro-title-text">The Unofficial DEAXS ADVENTURE Collection - Comic</div>
        </div>
        <div class="retro-window-controls">
            <button class="retro-btn" onclick="minimizeApp()">_</button>
            <button class="retro-btn" onclick="maximizeApp()">□</button>
            <button class="retro-btn" onclick="closeApp()">X</button>
        </div>
    </div>

    <div class="browser-ui-container">
        <div class="retro-tabs" id="tab-container"></div>
        <div class="retro-address-bar" style="position: relative;">
            <span class="retro-address-label">Address</span>
            <div class="retro-address-input-wrapper">
                <img src="assets/media/icon.png" class="fake-favicon" alt="icon">
                <input type="text" id="address-input" onkeypress="if(typeof handleAddressBar === 'function') handleAddressBar(event)" spellcheck="false">
            </div>
            
            <button id="bookmark-icon-btn" class="retro-btn" style="width: 24px; height: 24px; font-size: 16px; margin-left: 5px; display: flex; align-items: center; justify-content: center; padding-bottom: 2px;" onclick="toggleBookmarkMenu(event)">☆</button>
            
            <div id="bookmark-context-menu" class="bookmark-dropdown" style="display: none;">
                <div id="bookmark-save-action" class="bookmark-dropdown-action" onclick="saveCurrentPage()">+ Save this page</div>
                <div id="bookmark-save-divider" class="bookmark-dropdown-divider"></div>
                <div id="bookmark-dropdown-list" class="bookmark-dropdown-list"></div>
            </div>
        </div>
    </div>

    <a href="home.html" class="nav-btn floating-menu-btn">MAIN MENU</a>

    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <img id="lightbox-img" class="lightbox-content" style="display: none;" onerror="this.onerror=null; this.src='assets/media/fallback.png';">
        <video id="lightbox-vid" class="lightbox-content" controls loop style="display: none;"></video>
        <button class="lightbox-close-btn" onclick="closeLightbox(event)">CLOSE VIEW</button>
    </div>
    
    <header>
        <img src="assets/media/logo.png" alt="Deaxs Adventure" class="logo">
    </header>
    
    <img id="green-easter-egg" src="assets/media/greendav.png" style="display: none;">
    
    <main class="comic-container" id="main-content">
        <p style="text-align:center; color: #444;">[ LOADING DATA ]</p>
    </main>
    
    <footer id="nav-footer"></footer>
    
    <script src="assets/js/shared.js"></script>
    
    <script>
        const fs = require('fs');
        const path = require('path');

        let totalPagesCount = 1;

        function applyTheme() {
            const mode = localStorage.getItem('reader-mode') || 'dark';
            const mainFont = localStorage.getItem('reader-font-main') || 'default';
            const dialogueFont = localStorage.getItem('reader-font-dialogue') || 'default';
            const size = localStorage.getItem('reader-size') || 'medium';
            
            // 1. Apply Colors
            document.body.classList.toggle('light-mode', mode === 'light');
            document.body.classList.toggle('theme-metal', mode === 'metal');
            document.body.classList.toggle('theme-rsidnt', mode === 'rsidnt');
            document.body.classList.toggle('theme-threshold', mode === 'threshold');
            document.body.classList.toggle('theme-threshold', mode === 'thresholdred');
            // 2. Apply Main Font
            document.body.classList.remove('main-font-serif', 'main-font-sans', 'main-font-comic', 'main-font-dyslexic');
            if (mainFont !== 'default') document.body.classList.add(`main-font-${mainFont}`);

            // 3. Apply Dialogue Font
            document.body.classList.remove('dialogue-font-serif', 'dialogue-font-sans', 'dialogue-font-comic', 'dialogue-font-dyslexic');
            if (dialogueFont !== 'default') document.body.classList.add(`dialogue-font-${dialogueFont}`);
            
            // 4. Apply Sizes
            document.body.classList.remove('size-small', 'size-large', 'size-xlarge');
            if (size !== 'medium') document.body.classList.add(`size-${size}`);
        }

        function jumpToPage(event) {
            if (event.key === "Enter") {
                let page = parseInt(event.target.value);
                if (isNaN(page)) return;
                if (page < 1) page = 1;
                if (page > totalPagesCount) page = totalPagesCount;
                window.location.search = `?p=${page}`;
            }
        }

        function executeJump() {
            let input = document.getElementById('jump-input-field');
            if (input) {
                let page = parseInt(input.value);
                if (!isNaN(page)) {
                    if (page < 1) page = 1;
                    if (page > totalPagesCount) page = totalPagesCount;
                    window.location.search = `?p=${page}`;
                }
            }
        }

        let keyBuffer = '';
        const secretCode = 'green';

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName.toLowerCase() === 'input') return;

            const urlParams = new URLSearchParams(window.location.search);
            let currentPage = parseInt(urlParams.get('p') || "1");

            if (e.key === 'ArrowLeft' && currentPage > 1) {
                window.location.search = `?p=${currentPage - 1}`;
            } else if (e.key === 'ArrowRight' && currentPage < totalPagesCount) {
                window.location.search = `?p=${currentPage + 1}`;
            }

            if (localStorage.getItem('setting-eastereggs') !== 'false') {
                keyBuffer += e.key.toLowerCase();
                if (keyBuffer.length > secretCode.length) {
                    keyBuffer = keyBuffer.slice(-secretCode.length);
                }
                if (keyBuffer === secretCode) {
                    triggerGreenEasterEgg();
                    keyBuffer = ''; 
                }
            }
        });

        function triggerGreenEasterEgg() {
            setTimeout(() => {
                if (window.unlockAchievement) window.unlockAchievement('unlocked-green');
            }, 1500);
            
            const greenSound = new Audio('assets/media/bell.mp3');
            greenSound.volume = 0.8;
            greenSound.play().catch(err => console.log(err));
            document.body.classList.add('green-mode');
            const eggImg = document.getElementById('green-easter-egg');
            eggImg.style.display = 'block';
            eggImg.classList.remove('green-jumpscare');
            void eggImg.offsetWidth; 
            eggImg.classList.add('green-jumpscare');
            setTimeout(() => {
                eggImg.style.display = 'none';
            }, 800);
        }

        function openLightbox(src, type) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const vid = document.getElementById('lightbox-vid');
            if (type === 'video') {
                img.style.display = 'none';
                vid.src = src;
                vid.style.display = 'block';
                vid.play(); 
            } else {
                vid.style.display = 'none';
                vid.pause();
                img.src = src;
                img.style.display = 'block';
            }
            lb.classList.add('show');
            document.body.classList.add('no-scroll');
        }

        function closeLightbox(e) {
            if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close-btn')) {
                document.getElementById('lightbox').classList.remove('show');
                document.getElementById('lightbox-vid').pause(); 
                document.body.classList.remove('no-scroll');
            }
        }

        async function loadComic() {
            applyTheme();
            const container = document.getElementById('main-content');
            const footer = document.getElementById('nav-footer');
            const urlParams = new URLSearchParams(window.location.search);
            let currentPage = urlParams.get('p') || "1";
            
            const addressInput = document.getElementById('address-input');
            if (addressInput) {
                addressInput.value = `deaxs://comic/page/${currentPage}`;
            }

            localStorage.setItem('saved-page', currentPage);

            let lastLoadTime = sessionStorage.getItem('last-page-load-time');
            let currentTimeMs = Date.now();
            
            if (lastLoadTime) {
                let timeDiff = currentTimeMs - parseInt(lastLoadTime);
                if (timeDiff < 2000) {
                    let speedCount = parseInt(sessionStorage.getItem('speedreader-count') || "0") + 1;
                    sessionStorage.setItem('speedreader-count', speedCount.toString());
                    
                    if (speedCount >= 5 && window.unlockAchievement) {
                        window.unlockAchievement('unlocked-speedreader');
                    }
                } else {
                    sessionStorage.setItem('speedreader-count', "0");
                }
            }
            sessionStorage.setItem('last-page-load-time', currentTimeMs.toString());
            
            let highest = parseInt(localStorage.getItem('highest-page')) || 0;
            if (parseInt(currentPage) > highest) {
                localStorage.setItem('highest-page', currentPage);
            }

            try {
                const dataPath = path.join(__dirname, 'assets', 'data.json');
                const rawData = fs.readFileSync(dataPath, 'utf8');
                const data = JSON.parse(rawData);
                
                container.innerHTML = "";
                document.body.className = ''; 
                applyTheme();
                
                if (!data.pages || !data.pages[currentPage]) {
                    container.innerHTML = "<p style='text-align:center;'>[ EMPTY PAGE ]</p>";
                    return;
                }
                
                const pageKeys = Object.keys(data.pages).sort((a,b) => a-b);
                totalPagesCount = pageKeys.length;
                const lastPage = pageKeys[pageKeys.length - 1];

                function scanForAchievements(triggerType, currentVideoTime = 0) {
                    if (!window.APP_ACHIEVEMENTS) return;
                    for (const [id, ach] of Object.entries(window.APP_ACHIEVEMENTS)) {
                        if (ach.page === "last" && currentPage === lastPage && ach.trigger === triggerType) {
                            window.unlockAchievement(id);
                        }
                        else if (ach.page === currentPage && ach.trigger === triggerType) {
                            if (triggerType === "video-time") {
                                if (currentVideoTime >= ach.triggerTime) {
                                    window.unlockAchievement(id);
                                }
                            } else {
                                window.unlockAchievement(id);
                            }
                        }
                    }
                }

                scanForAchievements("load");

                if (data.pages[currentPage]) {
                    data.pages[currentPage].forEach(block => {
                        if (block.type === 'theme') {
                            document.body.classList.add(block.value);
                            return; 
                        }

                        const div = document.createElement('div');
                        div.className = "content-block";

                        if (block.type === 'image') {
                            div.innerHTML = `<img src="${block.value}" alt="Panel" class="comic-panel-img" onerror="this.onerror=null; this.src='assets/media/fallback.png';" onclick="openLightbox(this.getAttribute('src'), 'image')">`;
                        } else if (block.type === 'video') {
                            div.innerHTML = `
                                <div class="custom-video-wrapper">
                                    <video class="custom-video" src="${block.value}"></video>
                                    <div class="video-controls">
                                        <button class="retro-btn play-pause-btn" style="width: 30px;">▶</button>
                                        <div class="video-time-display"><span class="current-time">0:00</span></div>
                                        <input type="range" class="progress-bar" value="0" min="0" max="100" step="0.1">
                                        <button class="retro-btn mute-btn" style="width: 30px;">🔊</button>
                                        <input type="range" class="volume-bar" value="1" min="0" max="1" step="0.05" style="width: 50px;">
                                        <button class="retro-btn" style="width: 30px;" onclick="openLightbox('${block.value}', 'video')">🔍</button>
                                    </div>
                                </div>
                            `;
                        } else if (block.type === 'text') {
                            div.className += " text-block";
                            div.innerHTML = parseColors(block.value);
                        } else if (block.type === 'dialogue') {
                            div.className += " dialogue-box";
                            div.innerHTML = parseColors(block.value);
                        }
                        container.appendChild(div);
                    });
                }

                const videoWrappers = document.querySelectorAll('.custom-video-wrapper');
                videoWrappers.forEach(wrapper => {
                    const video = wrapper.querySelector('.custom-video');
                    const playBtn = wrapper.querySelector('.play-pause-btn');
                    const progressBar = wrapper.querySelector('.progress-bar');
                    const timeDisplay = wrapper.querySelector('.current-time');
                    const muteBtn = wrapper.querySelector('.mute-btn');
                    const volumeBar = wrapper.querySelector('.volume-bar');

                    // Load saved preferences
                    const savedVolume = localStorage.getItem('global-volume') || 1;
                    const savedMuted = localStorage.getItem('global-muted') === 'true';

                    video.volume = savedVolume;
                    video.muted = savedMuted;
                    volumeBar.value = savedMuted ? 0 : savedVolume;
                    muteBtn.innerText = savedMuted ? "🔇" : "🔊";

                    const formatTime = (seconds) => {
                        const mins = Math.floor(seconds / 60);
                        const secs = Math.floor(seconds % 60);
                        return `${mins}:${secs.toString().padStart(2, '0')}`;
                    };

                    const togglePlay = () => {
                        if (video.paused) {
                            video.play();
                            playBtn.innerText = "⏸";
                        } else {
                            video.pause();
                            playBtn.innerText = "▶";
                        }
                    };

                    playBtn.addEventListener('click', togglePlay);
                    video.addEventListener('click', togglePlay);

                    video.addEventListener('timeupdate', () => {
                        if (video.duration) {
                            progressBar.value = (video.currentTime / video.duration) * 100;
                            timeDisplay.innerText = formatTime(video.currentTime);
                        }
                        scanForAchievements("video-time", video.currentTime);
                    });

                    video.addEventListener('ended', () => {
                        scanForAchievements("video-end");
                    });

                    progressBar.addEventListener('input', (e) => {
                        video.currentTime = (e.target.value / 100) * video.duration;
                    });

                    // Save audio preferences when changed
                    muteBtn.addEventListener('click', () => {
                        video.muted = !video.muted;
                        muteBtn.innerText = video.muted ? "🔇" : "🔊";
                        volumeBar.value = video.muted ? 0 : video.volume;
                        localStorage.setItem('global-muted', video.muted);
                    });

                    volumeBar.addEventListener('input', (e) => {
                        video.volume = e.target.value;
                        video.muted = (video.volume == 0);
                        muteBtn.innerText = video.muted ? "🔇" : "🔊";
                        localStorage.setItem('global-volume', video.volume);
                        localStorage.setItem('global-muted', video.muted);
                    });
                });

                function parseColors(text) {
                    return text.replace(/\[(.*?)\|(.*?)(?:\|(.*?))?\]/g, (match, name, color, highlight) => {
                        let style = `color:${color.trim()}; font-weight:bold;`;
                        if (highlight) {
                            style += `background-color:${highlight.trim()}; padding: 0 4px; border-radius: 2px;`;
                        }
                        return `<span style="${style}">${name}</span>`;
                    });
                }

                const nextNum = parseInt(currentPage) + 1;
                const prevNum = parseInt(currentPage) - 1;

                footer.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        ${currentPage !== "1" ? `<a href="?p=1" class="nav-btn">FIRST</a>` : ''}
                        ${prevNum > 0 ? `<a href="?p=${prevNum}" class="nav-btn">PREV</a>` : ''}
                        <span class="page-indicator">PG. ${currentPage} / ${totalPagesCount}</span>
                        ${data.pages[nextNum.toString()] ? `<a href="?p=${nextNum}" class="nav-btn">NEXT</a>` : ''}
                        ${currentPage !== lastPage ? `<a href="?p=${lastPage}" class="nav-btn">LAST</a>` : ''}
                    </div>
                    
                    <div class="jump-container" style="flex-direction: column; gap: 15px;">
                        <div style="display: flex; gap: 10px; align-items: center; justify-content: center;">
                            GO TO PAGE: 
                            <input type="number" id="jump-input-field" class="jump-input" min="1" max="${totalPagesCount}" placeholder="${currentPage}" onkeypress="jumpToPage(event)">
                            <button class="jump-btn" onclick="executeJump()">GO</button>
                        </div>
                        
                        <div style="display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 5px;">
                            CHAPTER INDEX:
                            <select class="jump-input" style="width: auto; cursor: pointer; text-align: left; padding: 4px 10px; font-size: 0.9rem;" onchange="if(this.value) window.location.search = '?p=' + this.value;">
                                <option value="" disabled selected>-- Select a Scene --</option>
                                <option value="1">Act 1</option>
                                <option value="30" ${highest >= 30 ? '' : 'disabled'}>Act 2 ${highest >= 30 ? '' : '[LOCKED]'}</option>
                            </select>
                        </div>
                    </div>
                `;

                if (data.pages[nextNum.toString()]) {
                    setTimeout(() => {
                        data.pages[nextNum.toString()].forEach(block => {
                            if (block.type === 'image') {
                                const img = new Image();
                                img.src = block.value;
                            } else if (block.type === 'video') {
                                const vid = document.createElement('video');
                                vid.preload = 'auto';
                                vid.src = block.value;
                            }
                        });
                    }, 500);
                }
                
            } catch (err) {
                console.error(err);
                container.innerHTML = "<p style='text-align:center;'>[ ERROR LOADING ]</p>";
            }
        }
        
        window.onload = loadComic;

        document.addEventListener('click', (e) => {
            if (localStorage.getItem('setting-clickturn') === 'false') return;
            
            if (['button', 'input', 'a', 'video', 'select'].includes(e.target.tagName.toLowerCase())) return;
            if (e.target.closest('.nav-btn')) return;

            const urlParams = new URLSearchParams(window.location.search);
            let currentPage = parseInt(urlParams.get('p') || "1");
            const screenWidth = window.innerWidth;
            const clickX = e.clientX;

            if (clickX < screenWidth * 0.25 && currentPage > 1) {
                window.location.search = `?p=${currentPage - 1}`;
            } else if (clickX > screenWidth * 0.75 && currentPage < totalPagesCount) {
                window.location.search = `?p=${currentPage + 1}`;
            }
        });
       
    </script> <script src="assets/js/shared.js"></script> 

</body>
</html>
