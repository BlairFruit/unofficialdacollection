name: Build and Release Desktop App

on: 
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write 

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build the App Engine
        run: npx electron-builder --win --dir

      - name: Assemble Portable Folder
        run: Copy-Item -Path "assets" -Destination "dist/win-unpacked/assets" -Recurse

      - name: Zip the Final Release
        run: Compress-Archive -Path "dist/win-unpacked\*" -DestinationPath "dist/Unofficial Deaxs Adventure Collection.zip"

      - name: Upload the Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unofficial-deaxsadventure-collection
          path: dist/*.zip 

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: UNOFFICIAL DEAXS ADVENTURE COLLECTION - ${{ github.ref_name }}
          files: dist/*.zip
          body_path: release-notes.md
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}