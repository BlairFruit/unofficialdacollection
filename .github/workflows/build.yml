name: Build and Release Desktop App

on: 
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write 

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      # FIX: Removed the GH_TOKEN so electron-builder stops stealing the release!
      - name: Build the App
        run: npm run build

      - name: Upload the Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unofficial-deaxsadventure-collection
          path: dist/win-unpacked/

      # This step now has full control over what the release looks like
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: UNOFFICIAL DEAXS ADVENTURE COLLECTION - ${{ github.ref_name }}
          files: dist/*.zip
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}